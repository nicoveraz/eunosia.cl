<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>
      .bg{fill:#0b0d0e}
      .panel{fill:#111416}
      .line{stroke:#1e2326;stroke-width:1}
      .accent{fill:#5eead4}
      .fg{fill:#f5f5f5}
      .dim{fill:#8a8f92}
      .mute{fill:#5a5f62}
      text{font-family:'JetBrains Mono',ui-monospace,Menlo,Consolas,monospace}
    </style>
  </defs>
  <rect class="bg" width="1200" height="630"/>

  <!-- grid lines -->
  <line class="line" x1="0" y1="120" x2="1200" y2="120"/>
  <line class="line" x1="0" y1="510" x2="1200" y2="510"/>

  <!-- header -->
  <text x="80" y="85" class="fg" font-size="26" font-weight="700">eunosia<tspan class="accent">.</tspan></text>
  <text x="1120" y="85" text-anchor="end" class="mute" font-size="16" letter-spacing="1.5">// IA CLÍNICA</text>

  <!-- main headline -->
  <text x="80" y="240" class="fg" font-size="64" font-weight="700" letter-spacing="-1">Inteligencia artificial</text>
  <text x="80" y="320" class="fg" font-size="64" font-weight="700" letter-spacing="-1">para <tspan class="accent">medicina de urgencia</tspan>.</text>

  <!-- lede -->
  <text x="80" y="400" class="dim" font-size="22">Modelos especializados en español clínico,</text>
  <text x="80" y="432" class="dim" font-size="22">integrados al flujo del médico sin fricción.</text>

  <!-- footer meta -->
  <text x="80" y="575" class="mute" font-size="16" letter-spacing="1">EUNOSIA.CL</text>
  <text x="1120" y="575" text-anchor="end" class="mute" font-size="16" letter-spacing="1">QUETRU LTDA · FRUTILLAR, CL</text>

  <!-- accent corner marker -->
  <rect class="accent" x="0" y="0" width="4" height="120"/>
</svg>
